<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Matías Gabriel Tello | Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0.1">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#565555",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "tertiary-container": "#f797f0",
                        "on-primary-container": "#002052",
                        "surface-dim": "#0e0e0e",
                        "surface-container-low": "#131313",
                        "error": "#ff716c",
                        "surface-tint": "#88adff",
                        "error-dim": "#d7383b",
                        "on-error": "#490006",
                        "outline-variant": "#484848",
                        "primary-fixed-dim": "#5890ff",
                        "on-tertiary": "#6d1b6d",
                        "inverse-surface": "#fcf9f8",
                        "surface-variant": "#262626",
                        "on-surface": "#ffffff",
                        "surface-container": "#191a1a",
                        "inverse-primary": "#0059c9",
                        "primary": "#88adff",
                        "surface": "#0e0e0e",
                        "on-tertiary-container": "#610e63",
                        "error-container": "#9f0519",
                        "on-primary-fixed-variant": "#002964",
                        "tertiary-fixed-dim": "#e88ae1",
                        "outline": "#767575",
                        "on-error-container": "#ffa8a3",
                        "secondary-fixed-dim": "#d7d4d3",
                        "on-primary": "#002b69",
                        "on-background": "#ffffff",
                        "secondary-container": "#474646",
                        "primary-fixed": "#719eff",
                        "on-secondary-fixed": "#403f3f",
                        "on-secondary": "#525151",
                        "tertiary-dim": "#e88ae1",
                        "surface-bright": "#2c2c2c",
                        "primary-dim": "#0f6ef0",
                        "tertiary": "#ffaaf7",
                        "on-surface-variant": "#adaaaa",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-dim": "#d7d4d3",
                        "on-tertiary-fixed": "#400042",
                        "primary-container": "#719eff",
                        "on-secondary-container": "#d2d0cf",
                        "on-tertiary-fixed-variant": "#6c1a6c",
                        "secondary": "#e5e2e1",
                        "tertiary-fixed": "#f797f0",
                        "on-primary-fixed": "#000000",
                        "surface-container-highest": "#262626",
                        "background": "#0e0e0e",
                        "surface-container-lowest": "#000000",
                        "surface-container-high": "#1f2020"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>

</head>

<body class="bg-surface text-on-surface selection:bg-primary selection:text-on-primary">
    <div id="modern-app">
        <nav class="fixed top-0 w-full z-50 backdrop-blur-xl transition-all duration-300">
            <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
                <div class="text-2xl font-black tracking-tighter text-white">MGT.</div>

                <div
                    class="hidden md:flex gap-8 items-center font-['Inter'] tracking-[-0.02em] text-sm uppercase font-medium">
                    <a class="relative text-white after:content-[''] after:absolute after:-bottom-1 after:left-1/2 after:-translate-x-1/2 after:w-1 after:h-1 after:bg-[#88adff] after:rounded-full hover:text-primary transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]"
                        href="#projects">Work</a>
                    <a class="text-[#adaaaa] hover:text-primary transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]"
                        href="#expertise">Expertise</a>
                    <a class="text-[#adaaaa] hover:text-primary transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]"
                        href="#habilidades">Skills</a>
                    <a class="text-[#adaaaa] hover:text-primary transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]"
                        href="#contact">Contact</a>
                </div>

                <div class="flex gap-4 items-center">
                    <button id="theme-toggle"
                        class="p-2 rounded-full border border-outline-variant/30 text-on-surface-variant hover:text-white hover:bg-surface-variant transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
                    </button>
                    <button id="btn-terminal-mode"
                        class="bg-primary text-on-primary px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest scale-95 active:scale-90 transition-transform">
                        Terminal
                    </button>
                </div>
            </div>
        </nav>

        <main class="pt-32 pb-24 px-6 md:px-12 max-w-7xl mx-auto">
            <!-- Hero Section (Dynamic) -->
            <section class="mb-32" id="hero-container">
            </section>

            <!-- Expertise Section (Dynamic) -->
            <section class="mb-32" id="expertise">
                <div id="expertise-header"></div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6" id="expertise-grid">
                </div>
            </section>

            <!-- Tecnologías Section (Dynamic) -->
            <section class="mb-32" id="habilidades">
                <h2 class="text-xs font-bold tracking-[0.3em] uppercase text-on-surface-variant mb-12 text-center">Tech Stack & Tools</h2>
                <div class="flex flex-wrap justify-center gap-6 w-full mx-auto text-white" id="skills-container">
                </div>
            </section>

            <!-- Proyectos Container (Dynamic) -->
            <div id="projects">
                <div id="projects-container"></div>
            </div>

            <!-- CTA Section (Dynamic) -->
            <section class="mt-32 mb-32 text-center py-20 bg-surface-container rounded-2xl relative overflow-hidden" id="cta-container">
            </section>
        </main>

        <!-- Footer (Dynamic) -->
        <footer class="bg-[#000000] w-full py-12 border-t border-[#484848]/15">
            <div class="flex flex-col md:flex-row justify-between items-center px-12 w-full gap-8 max-w-7xl mx-auto" id="footer-container">
            </div>
        </footer>
    </div>

    <div id="terminal-overlay" style="display: none;">
        <button id="btn-close-terminal"
            class="absolute top-5 right-5 z-[10000] bg-red-600 text-white font-mono text-sm px-4 py-2 hover:bg-white hover:text-red-600 transition-colors"
            aria-label="Cerrar Terminal">
            &times; CERRAR MODO TERMINAL
        </button>
        <div id="background-noise"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div id="terminal" class="terminal font-mono text-green-500 w-[90%] max-w-4xl mx-auto z-10 leading-loose">
        </div>
        <button id="reboot-button"
            class="fixed bottom-5 right-5 z-[1001] bg-red-600 text-white font-mono text-2xl border-2 border-red-600 shadow-[0_0_8px_red] px-4 py-2 cursor-pointer transition-colors"
            style="display: none;">&#9762;</button>
    </div>

    <script src="script.js?v=2.0.1"></script>
</body>

</html>
